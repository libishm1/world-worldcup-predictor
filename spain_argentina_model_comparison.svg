<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
<title id="title">Spain vs Argentina model comparison</title>
<desc id="desc">Bar chart comparing repository and improved model probabilities for Spain win, draw and Argentina win.</desc>
<rect width="1000" height="560" fill="white"/>
<text x="500" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700">Spain vs Argentina — 90-minute prediction</text>
<line x1="120" y1="460" x2="920" y2="460" stroke="#333" stroke-width="2"/>
<line x1="120" y1="100" x2="120" y2="460" stroke="#333" stroke-width="2"/>
<g font-family="Arial, sans-serif" font-size="16" fill="#333">
<text x="102" y="466" text-anchor="end">0%</text><text x="102" y="394" text-anchor="end">10%</text><text x="102" y="322" text-anchor="end">20%</text><text x="102" y="250" text-anchor="end">30%</text><text x="102" y="178" text-anchor="end">40%</text><text x="102" y="106" text-anchor="end">50%</text>
</g>
<g stroke="#ddd" stroke-width="1"><line x1="120" y1="388" x2="920" y2="388"/><line x1="120" y1="316" x2="920" y2="316"/><line x1="120" y1="244" x2="920" y2="244"/><line x1="120" y1="172" x2="920" y2="172"/><line x1="120" y1="100" x2="920" y2="100"/></g>
<!-- Spain -->
<rect x="190" y="174.2" width="70" height="285.8" fill="#6b7280"/><rect x="268" y="169.3" width="70" height="290.7" fill="#2563eb"/>
<!-- Draw -->
<rect x="450" y="283.6" width="70" height="176.4" fill="#6b7280"/><rect x="528" y="260.8" width="70" height="199.2" fill="#2563eb"/>
<!-- Argentina -->
<rect x="710" y="202.2" width="70" height="257.8" fill="#6b7280"/><rect x="788" y="229.8" width="70" height="230.2" fill="#2563eb"/>
<g font-family="Arial, sans-serif" font-size="17" fill="#111" text-anchor="middle">
<text x="229" y="164">39.7%</text><text x="303" y="159">40.4%</text><text x="489" y="274">24.5%</text><text x="563" y="251">27.7%</text><text x="749" y="192">35.8%</text><text x="823" y="220">32.0%</text>
<text x="264" y="495" font-weight="700">Spain</text><text x="524" y="495" font-weight="700">Draw</text><text x="784" y="495" font-weight="700">Argentina</text>
</g>
<g font-family="Arial, sans-serif" font-size="16"><rect x="325" y="520" width="22" height="16" fill="#6b7280"/><text x="355" y="534">Repository model</text><rect x="535" y="520" width="22" height="16" fill="#2563eb"/><text x="565" y="534">Improved ensemble</text></g>
</svg>
